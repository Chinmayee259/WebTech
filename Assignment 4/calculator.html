<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="outerBody">
        <div>
            <input style="border-radius: 6px;"  "text" id="display" readonly>
        </div>
        <div class="row">
            <button onclick="sq()" class="button">Sq</button>
            <button onclick="iPrompt()" class="button">Prompt</button>
            <button onclick="clearScreen()" class="button">Cls</button>
            <button style="background-color: aliceblue;" onclick="append('/')" class="button">/</button>
        </div>

        <div class="row">
            <button onclick="append('7')" class="button">7</button>
            <button onclick="append('8')" class="button">8</button>
            <button onclick="append('9')" class="button">9</button>
            <button style="background-color: aliceblue;" onclick="append('*')" class="button">*</button>
        </div>

        <div class="row">
            <button onclick="append('4')" class="button">4</button>
            <button onclick="append('5')" class="button">5</button>
            <button onclick="append('6')" class="button">6</button>
            <button style="background-color: aliceblue;" onclick="append('-')" class="button">-</button>
        </div>

        <div class="row">
            <button onclick="append('1')" class="button">1</button>
            <button onclick="append('2')" class="button">2</button>
            <button onclick="append('3')" class="button">3</button>
            <button style="background-color: aliceblue;" onclick="append('+')" class="button">+</button>
        </div>
        <div class="row" >
            <button onclick="append('0')" class="button">0</button>
            <button class="button">Sq</button>
            <button onclick="calculate()" class="button" style=" background: #08ee08;">=</button>
        </div>

    </div>

    <script src="style.css"></script>
</body>
</html>
