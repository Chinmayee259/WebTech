<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beautiful Calculator</title>

<style>
body {
    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
    font-family: Arial, sans-serif;
}

.calculator {
    width: 320px;
    margin: 80px auto;
    padding: 20px;
    border-radius: 15px;
    background: #1e1e2f;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.display {
    width: 100%;
    height: 60px;
    border: none;
    outline: none;
    text-align: right;
    font-size: 25px;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
    background: #2c2c3e;
    color: white;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 18px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.number {
    background: #3a3a5a;
    color: white;
}

.operator {
    background: #ff9f43;
    color: white;
}

.equal {
    background: #00d2d3;
    grid-column: span 2;
    color: black;
}

.clear {
    background: #ee5253;
    grid-column: span 2;
    color: white;
}
</style>

</head>

<body>

<div class="calculator">
    <input type="text" id="display" class="display" readonly>

    <div class="buttons">
        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('*')">×</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
function append(value) {
    document.getElementById("display").value += value;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function calculate() {
    try {
        document.getElementById("display").value =
            eval(document.getElementById("display").value);
    } catch {
        alert("Invalid Expression");
    }
}
</script>

</body>
</html>
